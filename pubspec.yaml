name: transvolt_fleet
description: "Transvolt"
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  jwt_decoder: ^2.0.1
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10
  flutter_native_splash: ^2.4.1
  pin_code_fields: ^8.0.1
  dio: ^5.4.0
  intl_phone_field: ^3.2.0
  uuid: ^4.5.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  intl: ^0.19.0
  open_filex: ^4.4.0
  path_provider: ^2.1.2
  video_player: ^2.9.2
  reorderables: ^0.6.0
  fl_chart: ^0.68.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - images/transvolt_logo.svg
    - images/transvolt_logo.png
    - .env
flutter_native_splash:
  color: "#ffffff"
  image: images/transvolt_logo.png
  android: true
  ios: true
  web: false
