name: transvolt_fleet
description: "Transvolt"
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  jwt_decoder: ^2.0.1
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10
  flutter_native_splash: ^2.4.1
  pin_code_fields: ^8.0.0
  dio: ^5.4.0
  intl_phone_field: ^3.2.0
  uuid: ^4.5.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  intl: ^0.20.2
  open_filex: ^4.4.0
  path_provider: ^2.1.2
  video_player: ^2.9.2
  reorderables: ^0.6.0
  fl_chart: ^1.2.0
  provider: ^6.1.2
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  video_thumbnail: ^0.5.6
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  connectivity_plus: ^7.0.0
  permission_handler: ^11.3.1
  media_store_plus: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - images/transvolt_logo.svg
    - images/transvolt_logo.png
    - .env.development
    - .env.production
flutter_native_splash:
  color: "#ffffff"
  image: images/transvolt_logo.png
  android: true
  ios: true
  web: false
flutter_icons:
  android: true
  ios: true
  image_path: "images/transvolt_app_logo.png"
